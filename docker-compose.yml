version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: GateLink_postgres
    environment:
      POSTGRES_USER: GateLink
      POSTGRES_PASSWORD: password
      POSTGRES_DB: GateLink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U GateLink"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: GateLink_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: GateLink_engine
    ports:
      - "8081:8081"
    env_file:
      - ./engine/.env
    environment:
      - DATABASE_URL=postgres://GateLink:password@postgres:5432/GateLink?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: GateLink_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://GateLink:password@postgres:5432/GateLink?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - ENGINE_INTERNAL_URL=http://engine:8081
      - API_PORT=8080
      - JWT_SECRET=${JWT_SECRET:-changeme-replace-in-production-64bytes}
    depends_on:
      engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: GateLink_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/buyer/login"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
