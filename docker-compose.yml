version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: TokenGlide_postgres
    environment:
      POSTGRES_USER: TokenGlide
      POSTGRES_PASSWORD: password
      POSTGRES_DB: TokenGlide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U TokenGlide"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: TokenGlide_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: TokenGlide_engine
    ports:
      - "8081:8081"
    env_file:
      - ./engine/.env
    environment:
      - DATABASE_URL=postgres://TokenGlide:password@postgres:5432/TokenGlide?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
